# See https://pre-commit.com for more information.
# Install: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  # .NET formatting. If the dotnet SDK is not on PATH, the hook prints a
  # notice and passes (exit 0) instead of failing, so contributors without
  # the SDK can still commit. When dotnet is present, its own exit code
  # propagates, so genuine formatting errors still fail the hook.
  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format
        entry: "bash -c 'if command -v dotnet >/dev/null 2>&1; then dotnet format src/HtmlToDocx.csproj; else echo \"[pre-commit] .NET SDK (dotnet) not found on PATH; skipping dotnet format. Install the .NET 8 SDK to enable C# formatting.\"; fi'"
        language: system
        pass_filenames: false
        types_or: [c#]
