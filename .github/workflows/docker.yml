name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: iplweb/html2docx

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Run unit tests
      run: dotnet test test/HtmlToDocx.Tests/HtmlToDocx.Tests.csproj --configuration Release

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Test Docker image
      if: github.event_name != 'pull_request'
      env:
        IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      run: |
        set -euo pipefail

        # Sanity: --help prints usage and exits (it does NOT start the server).
        docker run --rm "$IMAGE" --help

        # CLI mode: an explicit '-' reads HTML from stdin and writes the DOCX to
        # stdout. Passing NO arguments starts the long-lived HTTP server and
        # blocks forever — that is what used to hang this step until the 6h
        # Actions limit and get the whole run cancelled.
        echo "<h1>Test</h1><p>This is a test HTML file.</p>" \
          | docker run --rm -i "$IMAGE" - > cli_output.docx
        [ "$(head -c4 cli_output.docx | od -An -tx1 | tr -d ' \n')" = "504b0304" ] \
          || { echo "CLI output is not a DOCX (missing PK zip magic)"; exit 1; }
        file cli_output.docx

        # Server mode (sidecar, the mode consumers actually run): no arguments
        # -> Kestrel on :3030. Run detached so the step never blocks; clean the
        # container up on exit regardless of outcome.
        docker run -d --rm --name h2d-test -p 3030:3030 "$IMAGE"
        trap 'docker rm -f h2d-test >/dev/null 2>&1 || true' EXIT

        # Wait for /health (up to ~30s) before hitting /convert.
        for i in $(seq 1 30); do
          if curl -fsS http://localhost:3030/health >/dev/null 2>&1; then break; fi
          if [ "$i" -eq 30 ]; then
            echo "server did not become healthy in time"; docker logs h2d-test; exit 1
          fi
          sleep 1
        done

        # POST /convert must return a DOCX.
        echo "<h1>Server</h1><p>Converted over HTTP.</p>" \
          | curl -fsS -X POST --data-binary @- \
              -H 'Content-Type: text/html; charset=utf-8' \
              http://localhost:3030/convert -o server_output.docx
        [ "$(head -c4 server_output.docx | od -An -tx1 | tr -d ' \n')" = "504b0304" ] \
          || { echo "server /convert output is not a DOCX"; exit 1; }
        file server_output.docx

        echo "OK: --help, CLI ('-') and HTTP server modes all work."
